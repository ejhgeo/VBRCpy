# ============================================================================
# Bayesian Seismic Inversion Config File (User Inputs)
# ============================================================================

# ----------------------------------------------------------------------------
# LOCATION MODE
# ----------------------------------------------------------------------------
# How to specify locations for the inversion:
#   - 'manual': specify locations, names, z_ranges directly below
#   - 'locations_file': load locations from a CSV/text file
#   - 'model': locations AND seismic data read from vs_file (format auto-detected)
location_mode: 'locations_file'  

# For 'locations_file' mode: path to location file
# Format: lon, lat, [name], z_min, z_max (comma or whitespace separated)
location_file: ./test_locations.csv

# For 'model' mode:
#   - vs_file provides the location grid AND Vs data
#   - q_file provides Q data (can be same file, different file, or a 1D model)
#   - model_z_range: optional depth range filter [z_min, z_max] in km
#   - model_subsample: use every Nth point (1 = all points)
# model_z_range: [99.6, 100.4]
# model_subsample: 10
default_vs_error: 0.05
default_q_error: 10.0

# ----------------------------------------------------------------------------
# MANUAL LOCATIONS (used only when location_mode: manual)
# ----------------------------------------------------------------------------
locations:
- - 40.7
  - -117.5
- - 39
  - -109.8
- - 37.2
  - -100.9
names:
- BasinRange
- ColoradoPlateau
- Interior
z_ranges:
- - 75
  - 105
- - 120
  - 150
- - 120
  - 150
location_colors:
- - 1
  - 0.6
  - 0
- - 0
  - 0.8
  - 0
- - 0
  - 0.3
  - 0

# ----------------------------------------------------------------------------
# DATA FILES
# ----------------------------------------------------------------------------
# vs_file / q_file accept any supported format: .mat, .csv, .nc, or a built-in
# 1D Earth model name ('prem', 'stw105').  Format is auto-detected.
# In 'model' mode, vs_file also provides the location grid.
# Examples:
#   vs_file: ./my_model.csv            # CSV with lon, lat, depth, Vs columns
#   vs_file: ./my_model.nc             # NetCDF file
#   vs_file: ./my_model.mat            # MATLAB .mat file
#   q_file: prem                       # Use PREM Qmu profile
#   q_file: stw105                     # Use STW105 Qmu profile
vs_file: ./vbrc_V2Tpy/data/vel_models/Shen_Ritzwoller_2016.mat
q_file: ./vbrc_V2Tpy/data/Q_models/Dalton_Ekstrom_2008.mat
lab_file: ./vbrc_V2Tpy/data/LAB_models/HopperFischer2018.mat
# sweep_file: ./vbrc_V2Tpy/data/plate_VBR/sweep_log_gs.mat  # original sweep file with VBRc distribution
sweep_file: ./sweep_fixed.mat
# sweep_file: ./test.mat

# ----------------------------------------------------------------------------
# INVERSION SETTINGS
# ----------------------------------------------------------------------------
# Anelastic methods: andrade_psp, eburgers_psp, xfit_mxw, xfit_premelt
anelastic_methods:
- eburgers_psp
- xfit_mxw
- xfit_premelt
- andrade_psp

# Grain size prior:
#   gs_prior_type: 'log_uniform' or 'log_normal'
#   gs_prior_mean_mm: mean grain size in mm (only for log_normal)
#   gs_prior_std: std dev in log-space (only for log_normal, default 0.25)
gs_prior_type: log_normal
gs_prior_mean_mm: 10.0
gs_prior_std: 0.25

# Melt fraction prior:
#   phi_prior_type: 'uniform' (default), 'zero_melt', 'piecewise_depth', or 'temperature_dependent'
#   phi_onset_depth_km: onset depth in km for piecewise_depth (default 80.0)
#     - uniform: flat prior over sweep range (current behavior)
#     - zero_melt: strongly suppress melt everywhere (narrow normal at phi=0)
#     - piecewise_depth: uniform above onset_depth_km, zero-melt below
#     - temperature_dependent: placeholder for future implementation
phi_prior_type: uniform
# phi_onset_depth_km: 80.0  # only used with piecewise_depth

# Observations to use: Vs, Q, or VsQ (both)
obs_types: VsQ

# ----------------------------------------------------------------------------
# OUTPUT SETTINGS
# ----------------------------------------------------------------------------
output_dir: plots_debug_new/
# output_dir: plots_reference_from_testmat_sweep/
save_plots: true
# force_plots: true      # force posterior plots even for large-scale runs
# plot_every_n: 5        # with force_plots, plot every N-th location (1 = all)

# For large-scale runs (tomography mode), save ML estimates to CSV
save_ml_csv: true
# ml_csv_file: ml_estimates.csv  # auto-generated if not specified
