# ============================================================================
# Combined config for the PREM validation case (validationCase_PREM).
#
# Inverts PREM Vs and Q profiles to recover temperature, melt fraction,
# grain size, and viscosity as a function of depth.  There is no "true"
# answer — this case checks that the inversion produces geophysically
# reasonable profiles given a well-known 1-D reference Earth model.
#
# Run with:
#   python -m VBRCpy.validation.validationCase_PREM.run_prem
# ============================================================================

# ── Output ───────────────────────────────────────────────────────────────────
output_dir: validation_tests/validationCase_PREM_cammarano_HK2003

# Reference Earth model for Vs/Q observations to invert.
# Options: prem, prem_nocrust, stw105
reference_model: prem_nocrust


# ── Sweep generation ─────────────────────────────────────────────────────────
sweep_generation:
  temperature:
    min: 100
    max: 2200
    step: 20

  melt_fraction:
    min: 0
    max: 0.05
    n_points: 21
    type: linear

  grain_size:
    min: 100       # 0.1 mm
    max: 10000     # 10 mm
    n_points: 25
    type: log

  depth:
    min: 10
    max: 660
    n_points: 131  # gives exactly 5 km spacing

  freq_log_min: -2.2
  freq_log_max: -1.3
  n_freq: 10

  anelastic_methods:
    - eburgers_psp
    - xfit_premelt

  # Viscous method for stored viscosity profiles:
  # 'HK2003' (Hirth & Kohlstedt 2003, default) or 'xfit_premelt' (YT2016)
  viscous_method: HK2003

  elastic:
    method: cammarano2003
    # temperature_scaling: isaak
    # pressure_scaling: cammarano
    # reference_scaling: default

  density_model: prem_nocrust

  solidus_method: yk2001

  plot_lut:
    enabled: true
    every_n: 5

  include_direct_melt_effect: 1


# ── Inversion settings ────────────────────────────────────────────────────────
# vs_file and q_file can be a built-in 1D model name ('prem', 'prem_nocrust',
# 'stw105') or a path to a .csv/.mat/.nc file.
location_mode: model
vs_file: prem_nocrust
q_file: prem_nocrust
model_z_range: [10, 660]

default_vs_error: 0.05
default_q_error: 50.0
q_error_mode: percent

anelastic_methods:
  - eburgers_psp
  - xfit_premelt

gs_prior_type: log_normal
gs_prior_mean_mm: 4.0
gs_prior_std: 1.0

phi_prior_type: piecewise_depth 
phi_onset_depth_km: 80.0

obs_types: VsQ

save_plots: true
force_plots: true
plot_every_n: 5
save_ml_csv: true
