# ============================================================================
# Bayesian inversion config for the round-trip validation example.
#
# Run with:
#   python -m vbrc_V2Tpy.bayesian_fitting_py \
#       --config vbrc_V2Tpy/validation/syntheticTest_adiabat/inversion_config.yaml
# ============================================================================

# Use csv_model mode — the synthetic Vs file acts as the "observed" data
location_mode: csv_model
seismic_model_file: validation_results/syntheticTest_adiabat/synthetic_observations.csv
default_vs_error: 0.05
default_q_error: 10.0

# Point to the sweep we just generated
sweep_file: validation_results/syntheticTest_adiabat/sweep.npz

# Inversion settings
anelastic_methods:
  - xfit_premelt

gs_prior_case: log_uniform
obs_types: Vs

# Output
output_dir: validation_results/syntheticTest_adiabat/inversion_results
save_plots: true
force_plots: true
save_ml_csv: true
ml_csv_file: validation_results/syntheticTest_adiabat/inversion_results/ml_estimates.csv
