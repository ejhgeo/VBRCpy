# ============================================================================
# Sweep generation config for the geotherm round-trip validation.
#
# Run with:
#   python -m vbrc_V2Tpy.bayesian_fitting_py.vbr.generate_sweep \
#       --config vbrc_V2Tpy/validation/syntheticTest_geotherm/sweep_config.yaml
# ============================================================================

sweep_generation:
  temperature:
    min: 100
    max: 2200
    step: 20

  melt_fraction:
    min: 0
    max: 0.05
    n_points: 21
    type: linear

  grain_size:
    min: 100       # 0.1 mm
    max: 10000     # 10 mm
    n_points: 25
    type: log

  depth:
    min: 10
    max: 660
    n_points: 131  # gives exactly 5 km spacing

  freq_log_min: -2.2
  freq_log_max: -1.3
  n_freq: 10

  anelastic_methods:
    - xfit_premelt

  # Output directory — sweep.npz and lut_plots/ are placed here automatically
  output_dir: validation_tests/syntheticTest_geotherm_cammarano2003_xfitpremelt/

  elastic:
    method: cammarano2003
    # method: anharmonic
    # temperature_scaling: isaak
    # pressure_scaling: cammarano
    # reference_scaling: default

  density_model: prem

  solidus_method: yk2001

  plot_lut:
    enabled: true
    every_n: 5

  include_direct_melt_effect: 1
