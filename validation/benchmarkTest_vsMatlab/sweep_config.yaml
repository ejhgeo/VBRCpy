# ============================================================================
# Sweep generation config for the MATLAB benchmark validation.
#
# These parameters match the original MATLAB VBRc sweep (vbr/test.mat)
# generated by generate_parameter_sweep.m with default Havlin et al. (2021)
# settings.
# 
# It can take 8-10 minutes to generate the sweep. 
#
# For the benchmark case, this is run from run_benchmark.py, which calls the inversion module with this config.:
#   python -m vbrc_V2Tpy.validation.benchmarkTest_vsMatlab
#
# If it detects that an identical sweep file already exists, it will skip sweep generation and use the existing file. 
# To force regeneration of the sweep, delete the existing sweep.npz file or change the output_file path in this config.
# 
# Sweep generation can also be run independently of run_benchmark.py with:
#   python -m vbrc_V2Tpy.bayesian_fitting_py.vbr.generate_sweep \
#       --config vbrc_V2Tpy/validation/benchmarkTest_vsMatlab/sweep_config.yaml
# ============================================================================

sweep_generation:
  temperature:
    min: 1100
    max: 1800
    step: 20

  melt_fraction:
    min: 0
    max: 0.05
    n_points: 21
    type: linear

  grain_size:
    min: 100       # 0.1 mm
    max: 30000     # 30 mm
    n_points: 25
    type: log

  depth:
    min: 50
    max: 170
    n_points: 100

  freq_log_min: -2.2
  freq_log_max: -1.3
  n_freq: 10

  period:
    min: 50
    max: 150

  anelastic_methods:
    - eburgers_psp
    - andrade_psp
    - xfit_mxw
    - xfit_premelt

  output_file: validation_tests/benchmarkTest_vsMatlab_newDataLoader/sweep.npz

  elastic:
    method: anharmonic
    temperature_scaling: isaak
    pressure_scaling: cammarano
    reference_scaling: default

  density_model: constant
  rho: 3300.0 
