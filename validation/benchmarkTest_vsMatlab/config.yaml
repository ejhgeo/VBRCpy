# ============================================================================
# Combined config for the MATLAB benchmark validation (benchmarkTest_vsMatlab).
#
# Run with:
#   python -m VBRCpy.validation.benchmarkTest_vsMatlab
# ============================================================================

# ── Output ───────────────────────────────────────────────────────────────────
# Change this ONE line to redirect all outputs to a new directory.
# The runner (run_benchmark.py) automatically places outputs as follows:
#   sweep.npz                           →  output_dir/
#   lut_comparison/<method>/            →  output_dir/
#   inversion results & plots           →  output_dir/inversion_results/
output_dir: validation_tests/benchmarkTest_vsMatlab_newDataLoader


# ── Sweep generation ─────────────────────────────────────────────────────────
# Parameters match the original MATLAB VBRc sweep (vbr/test.mat).
# Output path is controlled by output_dir above; do not add output_dir or
# output_file inside this section.
#
# It can take 8-10 minutes to generate the sweep.
sweep_generation:
  temperature:
    min: 1100
    max: 1800
    step: 20

  melt_fraction:
    min: 0
    max: 0.05
    n_points: 21
    type: linear

  grain_size:
    min: 100       # 0.1 mm
    max: 30000     # 30 mm
    n_points: 25
    type: log

  depth:
    min: 50
    max: 170
    n_points: 100

  freq_log_min: -2.2
  freq_log_max: -1.3
  n_freq: 10

  period:
    min: 50
    max: 150

  anelastic_methods:
    - eburgers_psp
    - andrade_psp
    - xfit_mxw
    - xfit_premelt

  elastic:
    method: anharmonic
    temperature_scaling: isaak
    pressure_scaling: cammarano
    reference_scaling: default

  density_model: constant
  rho: 3300.0


# ── Inversion settings ────────────────────────────────────────────────────────
# The sweep file path and inversion output directory are derived from
# output_dir automatically by run_benchmark.py.  Do not set sweep_file here.
location_mode: manual

locations:
- - 40.7
  - -117.5
- - 39
  - -109.8
- - 37.2
  - -100.9
names:
- BasinRange
- ColoradoPlateau
- Interior
z_ranges:
- - 75
  - 105
- - 120
  - 150
- - 120
  - 150
location_colors:
- - 1
  - 0.6
  - 0
- - 0
  - 0.8
  - 0
- - 0
  - 0.3
  - 0

# Data files (relative to workspace root)
vs_file: ./data/vel_models/Shen_Ritzwoller_2016.mat
q_file: ./data/Q_models/Dalton_Ekstrom_2008.mat
lab_file: ./data/LAB_models/HopperFischer2018.mat

anelastic_methods:
  - eburgers_psp
  - andrade_psp
  - xfit_mxw
  - xfit_premelt

gs_prior_type: log_uniform
obs_types: VsQ

save_plots: true
force_plots: true
save_ml_csv: true
