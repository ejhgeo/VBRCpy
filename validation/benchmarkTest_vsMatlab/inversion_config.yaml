# ============================================================================
# Bayesian inversion config for the MATLAB benchmark validation.
#
# Uses the same manual locations and settings as the original Havlin example
# to produce inversion results comparable to the MATLAB VBRc output.
#
# For the benchmark case, this is run from run_benchmark.py, which calls the inversion module with this config.:
#   python -m vbrc_V2Tpy.validation.benchmarkTest_vsMatlab
# To run benchmark with different grainsize priors: 
#   set gs_prior_type to "log_uniform" or "log_normal" (with gs_prior_mean_mm and gs_prior_std)  
# To run the benchmark with either Vs or Q only:
#   set obs_types to "Vs", "Q", or "VsQ" (both)
#
# Set output directory for where you want to store benchmark results: 
#   output_dir: validation_results/benchmarkTest_vsMatlab/inversion_results
#   DO NOT OUTPUT TO GITHUB REPO DIRECTORY; keep your GitHub repo clone clean
#
# Inversion can also be run independently of run_benchmark.py with:
#   python -m vbrc_V2Tpy.bayesian_fitting_py \
#       --config vbrc_V2Tpy/validation/benchmarkTest_vsMatlab/inversion_config.yaml
# ============================================================================

location_mode: manual

locations:
- - 40.7
  - -117.5
- - 39
  - -109.8
- - 37.2
  - -100.9
names:
- BasinRange
- ColoradoPlateau
- Interior
z_ranges:
- - 75
  - 105
- - 120
  - 150
- - 120
  - 150
location_colors:
- - 1
  - 0.6
  - 0
- - 0
  - 0.8
  - 0
- - 0
  - 0.3
  - 0

# Data files (relative to workspace root)
vs_file: ./vbrc_V2Tpy/data/vel_models/Shen_Ritzwoller_2016.mat
q_file: ./vbrc_V2Tpy/data/Q_models/Dalton_Ekstrom_2008.mat
lab_file: ./vbrc_V2Tpy/data/LAB_models/HopperFischer2018.mat

sweep_file: validation_tests/benchmarkTest_vsMatlab_newDataLoader/sweep.npz

# Inversion settings — all 4 methods
anelastic_methods:
  - eburgers_psp
  - andrade_psp
  - xfit_mxw
  - xfit_premelt

gs_prior_type: log_uniform
obs_types: VsQ

# Output
output_dir: validation_tests/benchmarkTest_vsMatlab_newDataLoader/inversion_results
save_plots: true
force_plots: true
save_ml_csv: true
ml_csv_file: validation_tests/benchmarkTest_vsMatlab_newDataLoader/inversion_results/ml_estimates.csv
